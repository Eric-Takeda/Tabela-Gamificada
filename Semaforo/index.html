<!DOCTYPE html> <!--HTML-->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semáforo</title>
    <link rel="stylesheet" href="style.css"> <!--CSS-->
</head>
<body>
    <main> <!--Define o conteúdo principal dentro do body-->
        <div> <!--Agrupa elementos do HTML-->
            <img src="./image/desligado.png" id="img"> <!--Insere uma imagem, e usa um ID, para ser modificado em outras linguagens-->
        </div>
        <div id="buttons"> 
            <button id="red" class="button" >Vermelho</button> <!--Insere um botão, com uma class no CSS-->
            <button id="yellow" class="button" >Amarelo</button>
            <button id="green" class="button" >Verde</button>
            <button id="automatic" class="button" >Automático</button>
        </div>
    </main>

    <script src="script.js"></script> <!--JavaScript-->    
</body>
</html>
