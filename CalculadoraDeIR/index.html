<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Imposto de Renda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section>

        <h1>Calculadora de Imposto de Renda</h1>

        <form>

            <label>Registro:</label>
            <input type="text" id="v1"/>

            <label>Nome:</label>
            <input type="text" id="v2"/>

            <label>Salário:</label>
            <input type="number" id="v3"/>

            <label>Imposto de Renda:</label>
            <input type="text" id="impostoResultado" readonly/>

            <button type="button" id="botao">
                Calcular IR
            </button>

        </form>

    </section>

    <section>

        <article id="texto">
            <h3>Resultados</h3>
        </article>

    </section>

    <footer>
        <p>&copy; Feito por Takeda e Leandro</p>
    </footer>

    <script src="script.js"></script>

</body>
