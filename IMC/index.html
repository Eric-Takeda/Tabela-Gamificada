<!DOCTYPE html> <!--HTML-->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC</title>
    <link rel="stylesheet" href="style.css"> <!--css-->
</head>
<body>
    <main> <!--Contém o conteúdo principal-->
        <div class="container"> <!--Div usasse para agrupar outros elementos, já o Class, para aplicar estilos CSS-->
            <div class="title">Calculadora - IMC</div>
            <div class="input">
                <label>Nome:</label> <!--Criar rótulos, por exemplos, na barra de digitação-->
                <input type="text" id="nome"> <!--Input type serve para inserir dados, no caso é caracteres, já o Id é um identificador para o Javascript-->
            </div>
            <div class="input">
                <label>Altura:</label>
                <input type="number" id="altura"> <!--O input type neste caso é números-->
            </div>
            <div class="input">
                <label>Peso:</label>
                <input type="number" id="peso">
            </div>
            <button id="calcular">Calcular</button> <!--Cria um botão com identificador-->

            <div class="result" id="resultado"></div>
        </div>
    </main>
    <script src="script.js"></script> <!--Javascript-->
</body>
</html>
