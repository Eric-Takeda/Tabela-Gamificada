<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Compilador PHP</title>

    <link rel="stylesheet" href="style.css">

    <!-- CodeMirror CSS -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material.min.css">

</head>

<body>

    <div class="container">

        <h1>Compilador PHP</h1>

        <div id="editor-wrapper">

            <textarea id="code"></textarea>

        </div>

        <button id="run-btn">

            Rodar PHP

        </button>

        <div class="output-container">

            <div id="output">

                >A saída irá aparecer aqui...

            </div>

        </div>

    </div>

    <!-- CodeMirror -->
    <script
    src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js">
    </script>

    <!-- Dependências PHP -->
    <script
    src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js">
    </script>

    <script
    src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js">
    </script>

    <script
    src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js">
    </script>

    <script
    src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js">
    </script>

    <script
    src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js">
    </script>

    <script
    src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/php/php.min.js">
    </script>

    <!-- Addons -->
    <script
    src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js">
    </script>

    <script
    src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js">
    </script>

    <!-- Script -->
    <script src="script.js"></script>

</body>

</html>
